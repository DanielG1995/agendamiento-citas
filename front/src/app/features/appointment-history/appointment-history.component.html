<mat-card>
  <mat-card-content>
    <form class="history-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>Placa</mat-label>
        <input matInput formControlName="plate" placeholder="PDF-1234" />
        <mat-error *ngIf="form.controls.plate.hasError('required')">
          La placa es obligatoria.
        </mat-error>
        <mat-error *ngIf="form.controls.plate.hasError('pattern')">
          Formato inválido. Ejemplo: PDF-1234.
        </mat-error>
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit" [disabled]="loading">
        Buscar
      </button>
    </form>
  </mat-card-content>
</mat-card>

<mat-card *ngIf="searched">
  <mat-card-title>Citas agendadas</mat-card-title>
  <mat-card-content>
    <div class="loading" *ngIf="loading">
      <mat-progress-spinner mode="indeterminate" diameter="36"></mat-progress-spinner>
    </div>

    <p class="error" *ngIf="!loading && errorMessage">{{ errorMessage }}</p>

    <ng-container *ngIf="!loading && !errorMessage">
      <ng-container *ngIf="appointments.length; else emptyState">
        <div class="table-wrapper">
          <table mat-table [dataSource]="appointments" class="mat-elevation-z1">
            <ng-container matColumnDef="date">
              <th mat-header-cell *matHeaderCellDef>Fecha</th>
              <td mat-cell *matCellDef="let appointment">
                {{ appointment.scheduledAt | date: 'fullDate' }}
              </td>
            </ng-container>

            <ng-container matColumnDef="time">
              <th mat-header-cell *matHeaderCellDef>Hora</th>
              <td mat-cell *matCellDef="let appointment">
                {{ appointment.scheduledAt | date: 'shortTime' }}
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      </ng-container>
      <ng-template #emptyState>
        <p class="empty">No hay citas registradas para esta placa.</p>
      </ng-template>
    </ng-container>
  </mat-card-content>
</mat-card>
